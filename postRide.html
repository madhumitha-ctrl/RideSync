<div class="container">

    <h1>🚘 Post Your Ride</h1>

    <div class="ride-box">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label>Source</label>
                <input type="text"
                       class="form-control"
                       placeholder="Enter Source"
                       id="source">
            </div>

            <div class="col-md-6 mb-3">
                <label>Destination</label>
                <input type="text"
                       class="form-control"
                       placeholder="Enter Destination"
                       id="destination">
            </div>

            <div class="col-md-6 mb-3">
                <label>Date</label>
                <input type="date"
                       class="form-control"
                       id="date">
            </div>

            <div class="col-md-6 mb-3">
                <label>Time</label>
                <input type="time"
                       class="form-control"
                       id="time">
            </div>

            <div class="col-md-6 mb-3">
                <label>Vehicle Name</label>
                <input type="text"
                       class="form-control"
                       placeholder="Swift Dzire"
                       id="vehicleName">
            </div>

            <div class="col-md-6 mb-3">
                <label>Vehicle Number</label>
                <input type="text"
                       class="form-control"
                       placeholder="TS09AB1234"
                       id="vehicleNumber">
            </div>

            <div class="col-md-6 mb-3">
                <label>Available Seats</label>
                <input type="number"
                       class="form-control"
                       id="seats">
            </div>

            <div class="col-md-6 mb-3">
                <label>Fare Per Seat (₹)</label>
                <input type="number"
                       class="form-control"
                       placeholder="250"
                       id="fare">
            </div>

            <div class="col-md-6 mb-3">

                <label>Gender Preference</label>

                <select class="form-select"
                        id="gender">

                    <option>Anyone</option>
                    <option>Male Only</option>
                    <option>Female Only</option>

                </select>

            </div>

            <div class="col-md-6 mb-3">

                <label>Vehicle Type</label>

                <select class="form-select"
                        id="vehicleType">

                    <option>AC</option>
                    <option>Non-AC</option>

                </select>

            </div>

            <div class="col-md-12 mb-3">

                <label>Contact Number</label>

                <input type="text"
                       class="form-control"
                       placeholder="9876543210"
                       id="contact">

            </div>

            <div class="col-md-12 mb-4">

                <label>Additional Notes</label>

                <textarea class="form-control"
                          rows="3"
                          placeholder="No smoking inside the car"
                          id="notes"></textarea>

            </div>

            <div class="col-md-12">

                <button type="button"
                        class="btn btn-success w-100"
                        id="postRideBtn">

                    🚘 Post Ride

                </button>

            </div>

        </div>

    </div>

</div>

<script src="js/script.js"></script>
